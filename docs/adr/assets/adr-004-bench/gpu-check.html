<!doctype html>
<html><body>
<script>
(function () {
  const canvas = document.createElement('canvas');
  let info = { webgl: false, renderer: null, vendor: null, unmaskedRenderer: null, unmaskedVendor: null };
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (gl) {
    info.webgl = true;
    info.renderer = gl.getParameter(gl.RENDERER);
    info.vendor = gl.getParameter(gl.VENDOR);
    const ext = gl.getExtension('WEBGL_debug_renderer_info');
    if (ext) {
      info.unmaskedRenderer = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
      info.unmaskedVendor = gl.getParameter(ext.UNMASKED_VENDOR_WEBGL);
    }
  }
  window.__GPU_INFO__ = info;
  window.__GPU_DONE__ = true;
})();
</script>
</body></html>
