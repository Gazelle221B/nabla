<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>SVG bench</title>
<style>
  html, body { margin: 0; background: #111; }
  svg { display: block; }
  #hud { position: fixed; top: 4px; left: 4px; color: #0f0; font: 12px monospace; }
</style>
</head>
<body>
<div id="hud">running...</div>
<svg id="stage" width="960" height="600" xmlns="http://www.w3.org/2000/svg"></svg>

<script src="../common/bench.js"></script>
<script src="../common/sim.js"></script>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const scenario = params.get('scenario') || 'A';
  const n = parseInt(params.get('n') || '200', 10);
  const svgNS = 'http://www.w3.org/2000/svg';
  const stage = document.getElementById('stage');
  const W = 960, H = 600;

  if (scenario === 'A') {
    // N-arm epicycle chain + trailing path.
    const arms = NablaSim.makeEpicycles(n);
    const pts = new Float64Array(n * 4);
    const trace = [];
    const cx = W / 2, cy = H / 2, scale = 3;

    const lines = [];
    for (let i = 0; i < n; i++) {
      const el = document.createElementNS(svgNS, 'line');
      el.setAttribute('stroke', i % 2 === 0 ? '#4ea1ff' : '#ff9c4e');
      el.setAttribute('stroke-width', '1');
      stage.appendChild(el);
      lines.push(el);
    }
    const traceEl = document.createElementNS(svgNS, 'path');
    traceEl.setAttribute('stroke', '#ffffff');
    traceEl.setAttribute('stroke-width', '1.5');
    traceEl.setAttribute('fill', 'none');
    stage.appendChild(traceEl);

    NablaBench.start((now, elapsed) => {
      const tSec = now / 1000;
      NablaSim.stepEpicycles(arms, tSec, cx, cy, scale, pts, trace);
      for (let i = 0; i < n; i++) {
        const el = lines[i];
        el.setAttribute('x1', pts[i * 4]);
        el.setAttribute('y1', pts[i * 4 + 1]);
        el.setAttribute('x2', pts[i * 4 + 2]);
        el.setAttribute('y2', pts[i * 4 + 3]);
      }
      let d = '';
      for (let i = 0; i < trace.length; i += 2) {
        d += (i === 0 ? 'M' : 'L') + trace[i].toFixed(2) + ' ' + trace[i + 1].toFixed(2) + ' ';
      }
      traceEl.setAttribute('d', d);
      document.getElementById('hud').textContent = `A n=${n} elapsed=${elapsed.toFixed(0)}ms`;
    });
  } else {
    // N-point CLT dot histogram, positions updated every frame.
    const circles = [];
    for (let i = 0; i < n; i++) {
      const el = document.createElementNS(svgNS, 'circle');
      el.setAttribute('r', '2');
      el.setAttribute('fill', '#4ea1ff');
      el.setAttribute('fill-opacity', '0.6');
      stage.appendChild(el);
      circles.push(el);
    }
    const xs = new Float64Array(n);
    const ys = new Float64Array(n);

    NablaBench.start((now, elapsed) => {
      NablaSim.stepCltHistogram(n, W, H, xs, ys);
      for (let i = 0; i < n; i++) {
        const el = circles[i];
        el.setAttribute('cx', xs[i]);
        el.setAttribute('cy', ys[i]);
      }
      document.getElementById('hud').textContent = `B n=${n} elapsed=${elapsed.toFixed(0)}ms`;
    });
  }
})();
</script>
</body>
</html>
